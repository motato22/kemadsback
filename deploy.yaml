# yaml-language-server: $schema=https://raw.githubusercontent.com/deployphp/deployer/master/src/schema.json
import: 
  - recipe/laravel.php

config:
  repository: 'git@github.com:motato22/kemadsback.git'
  keep_releases: 3
  git_ssh_command: 'ssh -i /root/.ssh/id_ed25519_kemads -o StrictHostKeyChecking=accept-new -o IdentitiesOnly=yes'

hosts:
  staging:
    hostname: 144.126.208.11
    remote_user: root
    deploy_path: /var/www/kemads.bridgestudio.host

tasks:
  reload:services:
    - run: systemctl restart apache2 php8.3-fpm

after:
  deploy:failed: deploy:unlock
  deploy:success: reload:services
