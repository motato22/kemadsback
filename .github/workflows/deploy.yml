# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: deploy

on:
  push:
    branches:
      - main

concurrency: deployments

jobs:
  deploy:
    if: github.repository_owner == 'motato22'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH key
        run: |
          printf '%s\n' "${{secrets.PRIVATE_KEY_STAGING}}" > deploy_key
          chmod 600 deploy_key

      - name: Deploy
        env:
          SSH_KEY_PATH: deploy_key
          STAGING_HOST: kemads.bridgestudio.host
          STAGING_USER: root
          DEPLOY_PATH: /var/www/kemads.bridgestudio.host/current
          DEPLOY_BRANCH: main
        run: ./scripts/deploy.sh
