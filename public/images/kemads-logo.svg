<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 28" role="img" aria-label="KEMADS">
  <defs>
    <linearGradient id="bars-light" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#002557"/>
      <stop offset="50%" stop-color="#2370D8"/>
      <stop offset="100%" stop-color="#6CCAFF"/>
    </linearGradient>
  </defs>
  <!-- Barras ascendentes: columnas con 1, 2, 3, 4 cuadrados -->
  <g fill="url(#bars-light)">
    <rect x="0" y="20" width="5" height="5" rx="0.5"/>
    <rect x="6" y="15" width="5" height="5" rx="0.5"/>
    <rect x="6" y="20" width="5" height="5" rx="0.5"/>
    <rect x="12" y="10" width="5" height="5" rx="0.5"/>
    <rect x="12" y="15" width="5" height="5" rx="0.5"/>
    <rect x="12" y="20" width="5" height="5" rx="0.5"/>
    <rect x="18" y="5" width="5" height="5" rx="0.5"/>
    <rect x="18" y="10" width="5" height="5" rx="0.5"/>
    <rect x="18" y="15" width="5" height="5" rx="0.5"/>
    <rect x="18" y="20" width="5" height="5" rx="0.5"/>
  </g>
  <!-- K estilizada (geométrica) -->
  <text x="30" y="22" font-family="Montserrat, sans-serif" font-size="18" font-weight="700" fill="#002557">K</text>
</svg>
